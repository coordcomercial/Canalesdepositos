<html lang="es">

<title>Canales de Depósitos — CIPlastic</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a3a6b;--teal:#2bbfd4;
  --bg:#f0f4f9;--surface:#fff;--border:#d0daea;--surface2:#e8eef7;
  --text:#1a2640;--muted:#6b7fa0;
  --c1:#3266ad;--c2:#1D9E75;--c3:#7F77DD;--c4:#D85A30;--c5:#D4537E;
  --green:#00a854;--green-bg:#e6f7ef;--yellow:#d4960a;--yellow-bg:#fef8e6;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}

/* HEADER */
header{background:var(--navy);border-bottom:3px solid var(--teal);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{height:34px;object-fit:contain;filter:brightness(0) invert(1)}
.htitle{color:rgba(255,255,255,.6);font-size:12px;border-left:1px solid rgba(255,255,255,.2);padding-left:14px;margin-left:8px}
.hright{display:flex;align-items:center;gap:10px}
#lupd{color:rgba(255,255,255,.4);font-size:11px;font-family:'DM Mono',monospace}

/* MONTH TABS */
.tabs-bar{background:var(--navy);border-bottom:1px solid rgba(255,255,255,.1);padding:0 28px;display:flex;gap:4px}
.tab{padding:10px 18px;font-size:13px;font-weight:500;color:rgba(255,255,255,.5);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:'DM Sans',sans-serif}
.tab:hover{color:rgba(255,255,255,.8)}
.tab.active{color:#fff;border-bottom-color:var(--teal)}
.tab.soon{color:rgba(255,255,255,.25);cursor:default;font-size:12px}

/* MAIN */
main{padding:24px 28px;max-width:1400px;margin:0 auto}

/* METRICS */
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.mc.c1::before{background:var(--c1)}.mc.c2::before{background:var(--c2)}.mc.c3::before{background:var(--c3)}.mc.c4::before{background:var(--c4)}.mc.c5::before{background:var(--c5)}
.ml{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.mv{font-size:24px;font-weight:600;color:var(--text);line-height:1;margin-bottom:3px}
.ms{font-size:11px;color:var(--muted)}

/* CARDS */
.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.row3{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 20px}
.ct{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.cs{font-size:13px;font-weight:500;color:var(--text);margin-bottom:14px}
.cwrap{position:relative;width:100%}
.slabel{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:24px 0 12px;display:flex;align-items:center;gap:10px}
.slabel::after{content:'';flex:1;height:1px;background:var(--border)}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin-bottom:10px}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.ld{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* RANK */
.ranklist{display:flex;flex-direction:column}
.rrow{display:grid;grid-template-columns:22px 1fr 50px;align-items:start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.rrow:last-child{border-bottom:none}
.rn{font-size:11px;font-weight:600;color:var(--muted);font-family:'DM Mono',monospace;padding-top:2px}
.rinfo{display:flex;flex-direction:column;gap:3px}
.rname{font-size:13px;font-weight:500;color:var(--text)}
.rbwrap{background:var(--surface2);border-radius:3px;height:5px;overflow:hidden;margin:2px 0}
.rb{height:100%;border-radius:3px}
.rcnt{font-size:10px;color:var(--muted)}
.rpct{font-size:13px;font-weight:600;text-align:right;padding-top:2px;font-family:'DM Mono',monospace}

/* CHANNEL BARS */
.chbr{display:flex;height:5px;border-radius:3px;overflow:hidden;margin:3px 0;gap:1px}
.chseg{height:100%;min-width:2px}
.chlbls{display:flex;gap:8px;flex-wrap:wrap;margin-top:3px}
.chll{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:3px}
.chld{width:6px;height:6px;border-radius:1px;flex-shrink:0}

/* CHANNEL TABLE */
.cht{width:100%;border-collapse:collapse;font-size:13px}
.cht th{text-align:left;padding:7px 8px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--border)}
.cht th:not(:first-child){text-align:right}
.cht td{padding:9px 8px;border-bottom:1px solid var(--border);color:var(--text)}
.cht td:not(:first-child){text-align:right;font-family:'DM Mono',monospace;font-size:12px}
.cht tr:last-child td{border-bottom:none}
.cht .tr td{font-weight:600;color:var(--navy);border-top:2px solid var(--border)}
.cdot{display:inline-block;width:7px;height:7px;border-radius:2px;margin-right:6px;vertical-align:middle}
.pill{display:inline-block;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:500}
.pill.h{background:var(--green-bg);color:var(--green)}
.pill.m{background:var(--yellow-bg);color:var(--yellow)}
.pill.l{background:var(--surface2);color:var(--muted)}

footer{background:var(--navy);padding:16px 28px;text-align:center;margin-top:32px}
.ft{color:rgba(255,255,255,.35);font-size:11px}
.fteal{color:var(--teal)}

@media(max-width:860px){.row2,.row3{grid-template-columns:1fr}main{padding:16px}header{padding:0 16px}.tabs-bar{padding:0 16px}.htitle{display:none}}
</style>
</head>

//  CANALES

const CH_COLORS = {
  'Meta Ads Pagado':'#3266ad',
  'Orgánico Meta/WA':'#1D9E75',
  'Google Ads':'#D85A30',
  'Website':'#7F77DD',

  'Otros':'#B4B2A9'

const PROC_COLORS = ['#3266ad','#1D9E75','#7F77DD','#D85A30','#D4537E','#885FAB','#2BA8AB','#D4860A','#5B8CCC','#888780'];

function classifyChannel(src, adId) {
  const s = (src||'').toUpperCase().trim();
  const a = (adId||'').toUpperCase().trim();
  const hasPaidId = /^\d{10,}$/.test(a);
  const hasNamedAd = ['ADS','CAMPAÑA','RINO','GLOW','SEPTOPLASTIA','INSTAGRAM ADS','SOCIAL MEDIA'].some(k=>a.includes(k));
  if(s.includes('META ADS')||s==='META ADS FB'||s==='META ADS IG'||s==='META ADS'||hasPaidId||hasNamedAd) return 'Meta Ads Pagado';
  if(s.includes('META ORG')||s.includes('META IG ORG')||s.includes('WHATSAPP ORG')||s==='ORGANICO'||s==='ORGÁNICO'||s.includes('WA')) return 'Orgánico Meta/WA';
  if(s.includes('GOOGLE')) return 'Google Ads';
  if(s==='WEBSITE'||s==='WEB') return 'Website';
  if(s.includes('TIKTOK')) return 'TikTok';
  if(s.includes('PX CIPLASTIC')||s.includes('PX. CIPLASTIC')||s.includes('REF.')||s.includes('DR HERMES')||s.includes('DR.')||s.includes('RECOMENDACIÓN')||s.includes('ESPECTACULAR')) return 'Px Ciplastic / Ref';
  return 'Otros';
}

// ══════════════════════════════════════════════════
//  PROCESAR
// ══════════════════════════════════════════════════
function processMonth(rows) {
  const channels={}, cxMap={}, cxByChannel={};
  let totalDep=0, totalSurgery=0;
  rows.forEach(([src,adId,cx,dep,surgery])=>{
    if(dep===0&&surgery===0) return;
    const ch = classifyChannel(src,adId);
    if(!channels[ch]) channels[ch]={deposits:0,surgery:0,count:0};
    channels[ch].deposits+=dep; channels[ch].surgery+=surgery; channels[ch].count++;
    cxMap[cx]=(cxMap[cx]||0)+1;
    if(!cxByChannel[cx]) cxByChannel[cx]={meta:0,organico:0,ciplastic:0,otros:0};
    if(ch==='Meta Ads Pagado') cxByChannel[cx].meta++;
    else if(ch==='Orgánico Meta/WA') cxByChannel[cx].organico++;
    else if(ch==='Px Ciplastic / Ref') cxByChannel[cx].ciplastic++;
    else cxByChannel[cx].otros++;
    totalDep+=dep; totalSurgery+=surgery;
  });
  return {channels,cxMap,cxByChannel,totalDep,totalSurgery,totalPatients:rows.filter(r=>r[3]>0||r[4]>0).length};
}

    <div class="slabel">canales de adquisición</div>
    <div class="row2">
      <div class="card">
        <div class="ct">depósitos captados</div><div class="cs">Total USD por canal</div>
        <div class="legend" id="leg-bar">${legHTML(chKeys)}</div>
        <div class="cwrap" style="height:240px"><canvas id="cBar"></canvas></div>
      </div>
      <div class="card">
        <div class="ct">distribución de pacientes</div><div class="cs">% por canal</div>
        <div class="legend" id="leg-pie">${chKeys.map(k=>`<div class="li"><span class="ld" style="background:${CH_COLORS[k]||'#888'}"></span>${k} ${Math.round(channels[k].count/totalPatients*100)}%</div>`).join('')}</div>
        <div class="cwrap" style="height:240px"><canvas id="cPie"></canvas></div>
      </div>
    </div>

    <div class="row3">
      <div class="card">
        <div class="ct">tabla de canales</div><div class="cs">Pacientes, depósitos y venta por canal</div>
        <table class="cht">
          <thead><tr><th>Canal</th><th>Px</th><th>% Px</th><th>Depósitos</th><th>Venta</th></tr></thead>
          <tbody>${chKeys.map(k=>{
            const c=channels[k];const pct=Math.round(c.count/totalPatients*100);
            const cls=pct>=40?'h':pct>=15?'m':'l';
            return `<tr><td><span class="cdot" style="background:${CH_COLORS[k]||'#888'}"></span>${k}</td><td>${c.count}</td><td><span class="pill ${cls}">${pct}%</span></td><td>$${c.deposits.toLocaleString('en-US')}</td><td>$${c.surgery.toLocaleString('en-US')}</td></tr>`;
          }).join('')}</tbody>
          <tfoot><tr class="tr"><td>Total</td><td>${totalPatients}</td><td>100%</td><td>$${totalDep.toLocaleString('en-US')}</td><td>$${totalSurgery.toLocaleString('en-US')}</td></tr></tfoot>
        </table>
      </div>
      <div class="card">
        <div class="ct">depósitos semanales</div><div class="cs">Volumen por semana</div>
        <div class="cwrap" style="height:220px"><canvas id="cWeek"></canvas></div>
      </div>
    </div>

    <div class="slabel">procedimientos más vendidos</div>
    <div class="row2">
      <div class="card">
        <div class="ct">ranking</div><div class="cs">Por volumen de pacientes</div>
        <div class="ranklist">${cxSorted.map(([name,count],i)=>{
          const pct=Math.round(count/cxTotal*100);const bw=Math.round(count/cxSorted[0][1]*100);
          return `<div class="rrow"><span class="rn">#${i+1}</span><div class="rinfo"><span class="rname">${name}</span><div class="rbwrap"><div class="rb" style="width:${bw}%;background:${PROC_COLORS[i]||'#888'}"></div></div><span class="rcnt">${count} pacientes</span></div><span class="rpct" style="color:${PROC_COLORS[i]||'#888'}">${pct}%</span></div>`;
        }).join('')}</div>
      </div>
      <div class="card">
        <div class="ct">top 10 — volumen</div><div class="cs">Participación % sobre total</div>
        <div class="cwrap" style="height:${cxSorted.length*38+50}px"><canvas id="cProcs"></canvas></div>
      </div>
    </div>

    <div class="slabel">procedimientos por canal de adquisición</div>
    <div class="card" style="margin-bottom:20px">
      <div class="ct">desglose por procedimiento</div><div class="cs">Origen del canal por tipo de cirugía</div>
      <div class="ranklist">${cxSorted.map(([name,count],i)=>{
        const pct=Math.round(count/cxTotal*100);const bw=Math.round(count/cxSorted[0][1]*100);
        const ch=cxByChannel[name]||{meta:0,organico:0,ciplastic:0,otros:0};
        const tot=ch.meta+ch.organico+ch.ciplastic+ch.otros||1;
        const segs=[
          {k:'meta',c:'#3266ad',l:'Meta Ads'},
          {k:'organico',c:'#1D9E75',l:'Orgánico'},
          {k:'ciplastic',c:'#888780',l:'Px Ciplastic'},
          {k:'otros',c:'#B4B2A9',l:'Otros'},
        ].map(({k,c,l})=>{
          const w=Math.round(ch[k]/tot*100);
          return w>0?`<div class="chseg" style="flex:${w};background:${c}" title="${l}: ${ch[k]}"></div>`:'';
        }).join('');
        const lbls=[
          {k:'meta',c:'#3266ad',l:'Meta'},
          {k:'organico',c:'#1D9E75',l:'Orgánico'},
          {k:'ciplastic',c:'#888780',l:'Px Ciplastic'},
          {k:'otros',c:'#B4B2A9',l:'Otros'},
        ].filter(({k})=>ch[k]>0).map(({k,c,l})=>`<span class="chll"><span class="chld" style="background:${c}"></span>${l} ${ch[k]}</span>`).join('');
        return `<div class="rrow"><span class="rn">#${i+1}</span><div class="rinfo" style="flex:1"><span class="rname">${name}</span><div class="rbwrap"><div class="rb" style="width:${bw}%;background:${PROC_COLORS[i]||'#888'}"></div></div><div class="chbr">${segs}</div><div class="chlbls">${lbls}</div></div><div style="text-align:right;min-width:55px"><div class="rpct" style="color:${PROC_COLORS[i]||'#888'}">${pct}%</div><div class="rcnt">${count} px</div></div></div>`;
      }).join('')}
    </div>
    </div>
  `;

  // Semanas
  const wkDep=[0,0,0,0,0];
  m.rows.forEach(([,,,,],[,,dep])=>{});
  // Calcular semanas por índice de fila
  m.rows.forEach((r,i)=>{
    const dep=r[3];
    const w=i<23?0:i<46?1:i<69?2:i<92?3:4;
    wkDep[w]+=dep;
  });

  requestAnimationFrame(()=>{
    // Bar
    charts.bar = new Chart(document.getElementById('cBar'),{
      type:'bar',
      data:{labels:chKeys,datasets:[{data:chKeys.map(k=>channels[k].deposits),backgroundColor:chKeys.map(k=>CH_COLORS[k]||'#888'),borderRadius:4,borderSkipped:false}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' $'+c.raw.toLocaleString('en-US')}}},scales:{x:{ticks:{font:{size:11},maxRotation:35,autoSkip:false},grid:{display:false}},y:{ticks:{callback:v=>'$'+(v>=1000?Math.round(v/1000)+'k':v),font:{size:11}},grid:{color:'#e8eef7'}}}}
    });
    // Pie
    charts.pie = new Chart(document.getElementById('cPie'),{
      type:'doughnut',
      data:{labels:chKeys,datasets:[{data:chKeys.map(k=>channels[k].count),backgroundColor:chKeys.map(k=>CH_COLORS[k]||'#888'),borderWidth:2,borderColor:'#fff'}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.label+': '+c.raw+' px ('+Math.round(c.raw/totalPatients*100)+'%)'}}}}
    });
    // Week
    charts.week = new Chart(document.getElementById('cWeek'),{
      type:'line',
      data:{labels:['Sem 1 (1–7)','Sem 2 (8–14)','Sem 3 (15–21)','Sem 4 (22–28)','Sem 5 (29+)'],datasets:[{data:wkDep,borderColor:'#3266ad',backgroundColor:'rgba(50,102,173,.07)',tension:.35,fill:true,pointRadius:5,pointBackgroundColor:'#3266ad',pointBorderColor:'#fff',pointBorderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' $'+c.raw.toLocaleString('en-US')}}},scales:{x:{ticks:{font:{size:11}},grid:{display:false}},y:{ticks:{callback:v=>'$'+(v>=1000?Math.round(v/1000)+'k':v),font:{size:11}},grid:{color:'#e8eef7'}}}}
    });
    // Procs
    charts.procs = new Chart(document.getElementById('cProcs'),{
      type:'bar',
      data:{labels:cxSorted.map(([n])=>n),datasets:[{data:cxSorted.map(([,c])=>c),backgroundColor:PROC_COLORS.slice(0,cxSorted.length),borderRadius:3,borderSkipped:false}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.raw+' px ('+Math.round(c.raw/cxTotal*100)+'%)'}}},scales:{x:{ticks:{font:{size:11}},grid:{color:'#e8eef7'}},y:{ticks:{font:{size:11}},grid:{display:false}}}}
    });
  });

  document.getElementById('lupd').textContent = m.label + ' · ' + new Date().toLocaleTimeString('es-MX');
}

function switchMonth(key) {
  if(!MONTHS[key]) return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  render(key);
}

window.addEventListener('load', ()=> render('mayo'));
</script>
</body>
</html>
