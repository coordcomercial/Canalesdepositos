// ── CLASIFICAR CANAL ────────────────────────────────
function getCanal(src, adId) {
  var s=(src||'').toUpperCase().trim(), a=(adId||'').toUpperCase().trim();
  if(s.includes('META ADS')||s==='META ADS FB'||s==='META ADS IG'||s==='META ADS'||/^\d{10,}$/.test(a)||['ADS','CAMPAÑA','RINO','GLOW','SEPTOPLASTIA','INSTAGRAM ADS','SOCIAL MEDIA'].some(function(k){return a.includes(k);})) return 'Meta Ads Pagado';
  if(s.includes('META ORG')||s.includes('META IG ORG')||s.includes('WHATSAPP ORG')||s==='ORGANICO'||s==='ORGÁNICO'||s.includes('WA')||s.includes('WHATSAPP')) return 'Orgánico Meta/WA';
  if(s.includes('GOOGLE')) return 'Google Ads';
  if(s==='WEBSITE'||s==='WEB') return 'Website';
  if(s.includes('TIKTOK')) return 'TikTok';
  if(s.includes('PX CIPLASTIC')||s.includes('PX. CIPLASTIC')||s.includes('REF.')||s.includes('DR HERMES')||s.includes('DR.')||s.includes('RECOMENDACIÓN')||s.includes('ESPECTACULAR')) return 'Px Ciplastic / Ref';
  return 'Otros';
}

function shortAgent(a) {
  if(!a) return 'Equipo';
  var n=a.trim().split(' ')[0];
  if(n==='Misael'||n==='Msael') return 'Misael';
  if(n==='Alexa') return 'Alexa';
  if(n==='Pedro') return 'Pedro';
  if(n==='Karina') return 'Karina';
  return 'Equipo';
}

// ── PROCESAR ────────────────────────────────────────
// row format: [src, adId, cx, dep, surg, agent]
function process(rows) {
  var channels={}, cxMap={}, cxByCh={}, cxByAgent={};
  var dep=0, surg=0, count=0;
  rows.forEach(function(r) {
    if(r[3]===0 && r[4]===0) return;
    var canal=getCanal(r[0],r[1]), cx=r[2], d=r[3], s=r[4], ag=shortAgent(r[5]);
    if(!channels[canal]) channels[canal]={deposits:0,surgery:0,count:0};
    channels[canal].deposits+=d; channels[canal].surgery+=s; channels[canal].count++;
    cxMap[cx]=(cxMap[cx]||0)+1;
    if(!cxByCh[cx]) cxByCh[cx]={meta:0,organico:0,ciplastic:0,otros:0};
    if(canal==='Meta Ads Pagado') cxByCh[cx].meta++;
    else if(canal==='Orgánico Meta/WA') cxByCh[cx].organico++;
    else if(canal==='Px Ciplastic / Ref') cxByCh[cx].ciplastic++;
    else cxByCh[cx].otros++;
    if(!cxByAgent[cx]) cxByAgent[cx]={};
    cxByAgent[cx][ag]=(cxByAgent[cx][ag]||0)+1;
    dep+=d; surg+=s; count++;
  });
  return {channels,cxMap,cxByCh,cxByAgent,dep,surg,count};
}

// ── CHARTS ──────────────────────────────────────────
var charts = {};
function destroyCharts() {
  Object.values(charts).forEach(function(c){ try{c.destroy();}catch(e){} });
  charts = {};
}

// ── RENDER ──────────────────────────────────────────
function render(monthKey) {
  destroyCharts();
  var m = MONTHS[monthKey];
  var d = process(m.rows);
  var chKeys = Object.keys(d.channels).sort(function(a,b){ return d.channels[b].deposits-d.channels[a].deposits; });
  var cxSorted = Object.entries(d.cxMap).sort(function(a,b){ return b[1]-a[1]; }).slice(0,10);
  var cxTotal = Object.values(d.cxMap).reduce(function(a,b){ return a+b; },0);
  var metaDep = (d.channels['Meta Ads Pagado']||{deposits:0}).deposits;
  var metaPx  = (d.channels['Meta Ads Pagado']||{count:0}).count;
  var orgPx   = (d.channels['Orgánico Meta/WA']||{count:0}).count;
  var ticket  = d.count>0 ? Math.round(d.surg/d.count) : 0;

  // Semanas por índice de fila
  var wkDep=[0,0,0,0,0];
  m.rows.forEach(function(r,i){
    var w=i<23?0:i<46?1:i<69?2:i<92?3:4;
    wkDep[w]+=r[3];
  });

  // ── Métricas ──
  var metricsHTML =
    mc('c1','Total Depósitos','$'+d.dep.toLocaleString('en-US'),d.count+' pacientes')+
    mc('c2','Venta Cirugías','$'+d.surg.toLocaleString('en-US'),'USD estimado')+
    mc('c3','Meta Ads Pagado','$'+metaDep.toLocaleString('en-US'),Math.round(metaPx/d.count*100)+'% del total px')+
    mc('c4','Ticket Promedio','$'+ticket.toLocaleString('en-US'),'por cirugía')+
    mc('c5','Orgánico Meta/WA',orgPx+' px',Math.round(orgPx/d.count*100)+'% del período');

  // ── Leyenda barra ──
  var legendBar = chKeys.map(function(k){
    return '<div class="li"><span class="ld" style="background:'+(CH_COLORS[k]||'#888')+'"></span>'+k+'</div>';
  }).join('');

  // ── Leyenda pie ──
  var legendPie = chKeys.map(function(k){
    return '<div class="li"><span class="ld" style="background:'+(CH_COLORS[k]||'#888')+'"></span>'+k+' <strong style="color:var(--text)">'+d.channels[k].count+'</strong> ('+Math.round(d.channels[k].count/d.count*100)+'%)</div>';
  }).join('');

  // ── Tabla canales — nota "Otros" ──
  var otrosNote = '<div class="otros-note">'+
    '<strong>Otros</strong> incluye: Website/Tráfico directo, TikTok, Google Ads, Espectacular (OOH), Recomendaciones externas y fuentes sin clasificar.'+
    '</div>';

  var tableRows = chKeys.map(function(k){
    var c=d.channels[k], pct=Math.round(c.count/d.count*100), cls=pct>=40?'h':pct>=15?'m':'l';
    return '<tr><td><span class="cdot" style="background:'+(CH_COLORS[k]||'#888')+'"></span>'+k+'</td><td>'+c.count+'</td><td><span class="pill '+cls+'">'+pct+'%</span></td><td>$'+c.deposits.toLocaleString('en-US')+'</td><td>$'+c.surgery.toLocaleString('en-US')+'</td></tr>';
  }).join('');

  // ── Ranking procedimientos ──
  var rankHTML = cxSorted.map(function(entry,i){
    var name=entry[0], count=entry[1];
    var pct=Math.round(count/cxTotal*100), bw=Math.round(count/cxSorted[0][1]*100);
    return '<div class="rrow">'+
      '<span class="rn">#'+(i+1)+'</span>'+
      '<div class="rinfo">'+
        '<span style="font-size:13px;font-weight:500;color:var(--text)">'+name+'</span>'+
        '<div class="rbwrap"><div class="rb" style="width:'+bw+'%;background:'+(PROC_COLORS[i]||'#888')+'"></div></div>'+
        '<span class="rcnt">'+count+' pacientes</span>'+
      '</div>'+
      '<span class="rpct" style="color:'+(PROC_COLORS[i]||'#888')+'">'+pct+'%</span>'+
    '</div>';
  }).join('');

  // ── Tabla agentes por procedimiento ──
  // Collect all agents present
  var agentSet = {};
  cxSorted.forEach(function(entry){
    var ag = d.cxByAgent[entry[0]]||{};
    Object.keys(ag).forEach(function(a){ agentSet[a]=1; });
  });
  var agents = Object.keys(agentSet).sort();
  var agColors = ['#3266ad','#1D9E75','#D85A30','#7F77DD','#B4B2A9'];

  var agTableHead = '<tr><th>Procedimiento</th><th>Total</th>'+
    agents.map(function(a,i){ return '<th style="color:'+(agColors[i]||'#888')+'">'+a+'</th>'; }).join('')+
  '</tr>';

  var agTableRows = cxSorted.map(function(entry,i){
    var name=entry[0], total=entry[1];
    var ag=d.cxByAgent[name]||{};
    var cells = agents.map(function(a,ai){
      var n=ag[a]||0;
      var pct=total>0?Math.round(n/total*100):0;
      var bar = n>0 ? '<span class="ag-bar" style="width:'+(pct*0.8)+'px;background:'+(agColors[ai]||'#888')+'"></span>' : '';
      return '<td>'+(n>0?bar+pct+'%':'—')+'</td>';
    }).join('');
    return '<tr><td><span class="cdot" style="background:'+(PROC_COLORS[i]||'#888')+'"></span>'+name+'</td><td><strong>'+total+'</strong></td>'+cells+'</tr>';
  }).join('');

  var agTableFoot = '<tr class="tr"><td>Total</td><td>'+cxSorted.reduce(function(a,e){return a+e[1];},0)+'</td>'+
    agents.map(function(a){
      var t=cxSorted.reduce(function(acc,entry){return acc+(d.cxByAgent[entry[0]]||{})[a]||0;},0);
      return '<td><strong>'+t+'</strong></td>';
    }).join('')+'</tr>';

  // ── Desglose canal por procedimiento ──
  var desgHTML = cxSorted.map(function(entry,i){
    var name=entry[0], count=entry[1];
    var pct=Math.round(count/cxTotal*100), bw=Math.round(count/cxSorted[0][1]*100);
    var cb=d.cxByCh[name]||{meta:0,organico:0,ciplastic:0,otros:0};
    var tot=cb.meta+cb.organico+cb.ciplastic+cb.otros||1;
    var segs=CH_BREAKDOWN.map(function(x){
      var w=Math.round(cb[x.k]/tot*100);
      return w>0?'<div class="chseg" style="flex:'+w+';background:'+x.c+'" title="'+x.l+': '+cb[x.k]+'"></div>':'';
    }).join('');
    var lbls=CH_BREAKDOWN.filter(function(x){return cb[x.k]>0;}).map(function(x){
      return '<span class="chll"><span class="chld" style="background:'+x.c+'"></span>'+x.l+' '+cb[x.k]+'</span>';
    }).join('');
    return '<div class="rrow">'+
      '<span class="rn">#'+(i+1)+'</span>'+
      '<div class="rinfo" style="flex:1">'+
        '<span style="font-size:13px;font-weight:500;color:var(--text)">'+name+'</span>'+
        '<div class="rbwrap"><div class="rb" style="width:'+bw+'%;background:'+(PROC_COLORS[i]||'#888')+'"></div></div>'+
        '<div class="chbr">'+segs+'</div>'+
        '<div class="chlbls">'+lbls+'</div>'+
      '</div>'+
      '<div style="text-align:right;min-width:55px">'+
        '<div class="rpct" style="color:'+(PROC_COLORS[i]||'#888')+'">'+pct+'%</div>'+
        '<div class="rcnt">'+count+' px</div>'+
      '</div>'+
    '</div>';
  }).join('');

  var desgOtrosNote = '<div class="otros-note">'+
    '<strong>Otros (canal)</strong> incluye: Website, TikTok, Google Ads, Espectacular (OOH), Recomendaciones externas y fuentes sin clasificar en Meta.'+
    '</div>';

  // ── Armar HTML ──
  document.getElementById('dash').innerHTML =
    '<div class="slabel">resumen del período · '+m.period+'</div>'+
    '<div class="mgrid">'+metricsHTML+'</div>'+

    '<div class="slabel">canales de adquisición</div>'+
    '<div class="row2" style="margin-bottom:16px">'+
      '<div class="card"><div class="ct">depósitos captados</div><div class="cs">Total USD por canal</div>'+
        '<div class="legend">'+legendBar+'</div>'+
        '<div style="position:relative;height:220px"><canvas id="cBar"></canvas></div>'+
      '</div>'+
      '<div class="card"><div class="ct">depósitos semanales</div><div class="cs">Volumen por semana del mes</div>'+
        '<div style="position:relative;height:220px"><canvas id="cWeek"></canvas></div>'+
      '</div>'+
    '</div>'+
    '<div class="card" style="margin-bottom:16px">'+
      '<div class="ct">distribución de pacientes</div><div class="cs">% por canal de adquisición</div>'+
      '<div style="display:flex;align-items:center;gap:32px;flex-wrap:wrap">'+
        '<div style="position:relative;width:200px;height:200px;flex-shrink:0"><canvas id="cPie"></canvas></div>'+
        '<div class="legend" style="flex:1;gap:10px 20px">'+legendPie+'</div>'+
      '</div>'+
    '</div>'+
    '<div class="card" style="margin-bottom:16px">'+
      '<div class="ct">tabla de canales</div><div class="cs">Pacientes, depósitos y venta por canal</div>'+
      '<table class="cht"><thead><tr><th>Canal</th><th>Px</th><th>%</th><th>Depósitos</th><th>Venta</th></tr></thead>'+
      '<tbody>'+tableRows+'</tbody>'+
      '<tfoot><tr class="tr"><td>Total</td><td>'+d.count+'</td><td>100%</td><td>$'+d.dep.toLocaleString('en-US')+'</td><td>$'+d.surg.toLocaleString('en-US')+'</td></tr></tfoot></table>'+
      otrosNote+
    '</div>'+

    '<div class="slabel">procedimientos más vendidos</div>'+
    '<div class="card" style="margin-bottom:16px">'+
      '<div class="ct">ranking top 10</div><div class="cs">Por volumen de pacientes</div>'+
      '<div class="ranklist">'+rankHTML+'</div>'+
    '</div>'+

    '<div class="card" style="margin-bottom:16px">'+
      '<div class="ct">ventas por agente</div>'+
      '<div class="cs">% de cada agente sobre el total de ese procedimiento</div>'+
      '<table class="cht"><thead>'+agTableHead+'</thead><tbody>'+agTableRows+'</tbody><tfoot>'+agTableFoot+'</tfoot></table>'+
    '</div>'+

    '<div class="slabel">procedimientos por canal de adquisición</div>'+
    '<div class="card" style="margin-bottom:24px">'+
      '<div class="ct">desglose por procedimiento</div>'+
      '<div class="cs">Barra superior = total pacientes &nbsp;|&nbsp;'+
        CH_BREAKDOWN.map(function(x){ return '<span style="display:inline-flex;align-items:center;gap:4px;margin-right:10px"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:'+x.c+'"></span>'+x.l+'</span>'; }).join('')+
      '</div>'+
      '<div class="ranklist">'+desgHTML+'</div>'+
      desgOtrosNote+
    '</div>';

  // ── Init Charts ──────────────────────────────────
  setTimeout(function(){
    var elBar=document.getElementById('cBar');
    var elWeek=document.getElementById('cWeek');
    var elPie=document.getElementById('cPie');
    if(!elBar||!elWeek||!elPie) return;

    charts.bar = new Chart(elBar,{
      type:'bar',
      data:{labels:chKeys,datasets:[{data:chKeys.map(function(k){return d.channels[k].deposits;}),backgroundColor:chKeys.map(function(k){return CH_COLORS[k]||'#888';}),borderRadius:4,borderSkipped:false}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return ' $'+c.raw.toLocaleString('en-US');}}}},scales:{x:{ticks:{font:{size:10},maxRotation:35,autoSkip:false},grid:{display:false}},y:{ticks:{callback:function(v){return '$'+(v>=1000?Math.round(v/1000)+'k':v);},font:{size:10}},grid:{color:'#e8eef7'}}}}
    });

    charts.week = new Chart(elWeek,{
      type:'line',
      data:{labels:['Sem 1 (1-7)','Sem 2 (8-14)','Sem 3 (15-21)','Sem 4 (22-28)','Sem 5 (29+)'],datasets:[{data:wkDep,borderColor:'#3266ad',backgroundColor:'rgba(50,102,173,.08)',tension:.35,fill:true,pointRadius:5,pointBackgroundColor:'#3266ad',pointBorderColor:'#fff',pointBorderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return ' $'+c.raw.toLocaleString('en-US');}}}},scales:{x:{ticks:{font:{size:10}},grid:{display:false}},y:{ticks:{callback:function(v){return '$'+(v>=1000?Math.round(v/1000)+'k':v);},font:{size:10}},grid:{color:'#e8eef7'}}}}
    });

    charts.pie = new Chart(elPie,{
      type:'doughnut',
      data:{labels:chKeys,datasets:[{data:chKeys.map(function(k){return d.channels[k].count;}),backgroundColor:chKeys.map(function(k){return CH_COLORS[k]||'#888';}),borderWidth:2,borderColor:'#fff'}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return ' '+c.label+': '+c.raw+' px ('+Math.round(c.raw/d.count*100)+'%)';}}}}}
    });
  }, 50);

  document.getElementById('lupd').textContent = m.label+' · '+new Date().toLocaleTimeString('es-MX');
}

function mc(cls,label,val,sub){
  return '<div class="mc '+cls+'"><div class="ml">'+label+'</div><div class="mv">'+val+'</div><div class="ms">'+sub+'</div></div>';
}

function switchMonth(key,btn) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  btn.classList.add('active');
  render(key);
}

window.onload = function(){ render('mayo'); };
</script>
</body>
</html>
